<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עריכת תבניות SMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: system-ui, -apple-system, sans-serif; }
        .container { max-width: 900px; margin-top: 30px; margin-bottom: 50px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .template-group { margin-bottom: 30px; padding: 20px; border: 1px solid #e9ecef; border-radius: 8px; }
        label { font-weight: bold; margin-bottom: 10px; display: block; color: #075e54; font-size: 1.1rem; }
        .explanation { font-size: 0.9rem; color: #666; margin-bottom: 10px; background: #f1f3f5; padding: 8px; border-radius: 4px; }
        .warning { font-size: 0.85rem; color: #d63031; font-weight: bold; margin-top: 5px; }
        textarea { width: 100%; height: 100px; resize: vertical; font-family: monospace; }
        .btn-save { background-color: #27ae60; color: white; padding: 12px 40px; font-weight: bold; border-radius: 30px; }
        .btn-save:hover { background-color: #219150; color: white; }
        .alert { display: none; margin-top: 20px; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 300px; }
        .navbar { background-color: #075e54; margin-bottom: 20px; }
        .nav-link { color: white !important; }
        .placeholder-list { color: #0984e3; font-weight: 500; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <a class="navbar-brand text-white" href="/">גמרא SMS</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">לוח בקרה</a>
            <a class="nav-link" href="/simulator">סימולטור</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>עריכת תבניות SMS</h1>
        <button id="btn-check-sync" class="btn btn-outline-secondary">
            🔄 בדוק פערים מול הקוד
        </button>
    </div>
    <p class="text-muted mb-4">כאן ניתן לערוך את תוכן ההודעות שהמערכת שולחת. שים לב להסברים ולערכים שאסור לשנות.</p>

    <!-- Sync Alerts Section -->
    <div id="sync-alerts" style="display: none; border: 2px solid #ffc107; background-color: #fff3cd; padding: 20px; border-radius: 8px;" class="mb-4 shadow">
        <h5 class="fw-bold text-dark mb-3">⚠️ נמצאו פערים בין הקוד לבסיס הנתונים</h5>
        <div id="sync-details" class="mb-3"></div>
        <div class="text-center">
            <button id="btn-sync-all" class="btn btn-warning btn-lg fw-bold border border-dark shadow-sm">סנכרן את כל השינויים ל-DB</button>
        </div>
    </div>
    
    <div id="no-sync-alerts" style="display: none; border: 2px solid #198754; background-color: #d1e7dd; padding: 15px; border-radius: 8px;" class="mb-4">
        <h5 class="m-0 text-success fw-bold">✅ אין פערים! התבניות בבסיס הנתונים מסונכרנות באופן מלא עם קובץ הקוד.</h5>
    </div>
    
    <form id="templates-form">
        <div id="templates-container">
            <!-- Templates will be loaded here -->
        </div>
        
        <div class="text-center">
            <button type="submit" class="btn btn-save">שמור שינויים</button>
        </div>
    </form>
    
    <div id="success-alert" class="alert alert-success">התבניות נשמרו בהצלחה!</div>
    <div id="error-alert" class="alert alert-danger">שגיאה בשמירת התבניות.</div>
</div>

<script>
    const container = document.getElementById('templates-container');
    const form = document.getElementById('templates-form');
    const successAlert = document.getElementById('success-alert');
    const errorAlert = document.getElementById('error-alert');
    const syncAlerts = document.getElementById('sync-alerts');
    const syncDetails = document.getElementById('sync-details');
    const btnSyncAll = document.getElementById('btn-sync-all');

    const metadata = {
        "welcome_new_user": {
            "title": "הודעת ברוך הבא",
            "desc": "נשלחת למשתמש חדש מיד לאחר הרישום הראשוני.",
            "placeholders": "{name}",
            "risk": "אין למחוק את {name}"
        },
        "registration_success": {
            "title": "אישור הרשמה למסכת",
            "desc": "נשלחת לאחר שהמשתמש נרשם בהצלחה למסכת ספציפית.",
            "placeholders": "{tractate}, {start_daf}, {end_daf}, {rate}, {hour}",
            "risk": "אסור למחוק ערכי {}"
        },
        "main_menu": {
            "title": "תפריט ראשי",
            "desc": "ההודעה שנשלחת כשהמשתמש שולח הודעה ריקה או 'תפריט'.",
            "placeholders": "{name}",
            "risk": "שמור על מספור האפשרויות (1-6)"
        },
        "ask_update_daf": {
            "title": "בקשת עדכון דף",
            "desc": "נשלחת כשהמשתמש מבקש לעדכן את המיקום שלו בלימוד.",
            "placeholders": "אין",
            "risk": "המשתמש צריך לדעת איך לענות"
        },
        "update_daf_success": {
            "title": "אישור עדכון דף",
            "desc": "נשלחת לאחר שהמיקום עודכן בהצלחה.",
            "placeholders": "{daf}",
            "risk": "חובה להשאיר את {daf}"
        },
        "ask_pause_days": {
            "title": "בקשת ימי הקפאה",
            "desc": "נשלחת כשהמשתמש מבקש להקפיא את הלימוד.",
            "placeholders": "אין",
            "risk": "אין"
        },
        "pause_success": {
            "title": "אישור הקפאה",
            "desc": "נשלחת לאחר שהלימוד הוקפא בהצלחה.",
            "placeholders": "{days}, {date}",
            "risk": "חובה להשאיר את {days} ו-{date}"
        },
        "resume_success": {
            "title": "אישור ביטול הקפאה",
            "desc": "נשלחת כשהמשתמש חוזר ללמוד.",
            "placeholders": "אין",
            "risk": "אין"
        },
        "ask_new_hour": {
            "title": "בקשת שעת שליחה חדשה",
            "desc": "נשלחת כשהמשתמש מבקש לשנות את שעת קבלת ההודעות.",
            "placeholders": "אין",
            "risk": "מספר בין 0 ל-23"
        },
        "update_hour_success": {
            "title": "אישור עדכון שעה",
            "desc": "נשלחת לאחר ששעת השליחה עודכנה.",
            "placeholders": "{hour}",
            "risk": "חובה להשאיר את {hour}"
        },
        "already_sent_today": {
            "title": "הודעה כבר נשלחה היום",
            "desc": "נשלחת אם המשתמש מבקש שאלה נוספת באותו יום.",
            "placeholders": "אין",
            "risk": "אין"
        },
        "tomorrow_study": {
            "title": "תזכורת ללימוד של מחר",
            "desc": "נשלחת כחלק מהתגובה לשאלה יומית.",
            "placeholders": "{next_study}",
            "risk": "חובה להשאיר את {next_study}"
        },
        "question_format": {
            "title": "מבנה השאלה היומית",
            "desc": "זוהי התבנית העיקרית של השאלות שנשלחות מדי יום.",
            "placeholders": "{tractate}, {daf}, {question}",
            "risk": "קריטי: אסור למחוק את {tractate}, {daf} או {question}!"
        },
        "unregistered_instructions": {
            "title": "הוראות למשתמש לא רשום",
            "desc": "נשלחת למי ששולח הודעה ואינו רשום במערכת.",
            "placeholders": "אין",
            "risk": "חשוב להשאיר את הדוגמה ברורה"
        },
        "registration_step_2_instructions": {
            "title": "שלב 2 ברישום",
            "desc": "הנחיות להגדרת הלימוד (מסכת, דפים וכו')",
            "placeholders": "{name}",
            "risk": "חובה להשאיר את {name}"
        },
        "error_parsing_registration": {
            "title": "שגיאת רישום",
            "desc": "נשלחת כשהמערכת לא מצליחה לפענח את הודעת הרישום.",
            "placeholders": "אין",
            "risk": "אין"
        },
        "tractate_not_found": {
            "title": "מסכת לא נמצאה",
            "desc": "נשלחת כשהמשתמש מנסה להירשם למסכת שלא קיימת במאגר.",
            "placeholders": "{tractate}",
            "risk": "חובה להשאיר את {tractate}"
        },
        "no_questions_today": {
            "title": "אין שאלות להיום",
            "desc": "נשלחת כשאין שאלות בטווח הדפים הנוכחי",
            "placeholders": "אין",
            "risk": "אין"
        },
        "followup_reminder": {
            "title": "תזכורת מעקב",
            "desc": "נשלחת אם המשתמש לא ענה על השאלה",
            "placeholders": "{name}",
            "risk": "חובה להשאיר את {name}"
        }
    };

    function loadTemplates() {
        container.innerHTML = '';
        fetch('/api/templates')
            .then(res => res.json())
            .then(templates => {
                for (const [key, value] of Object.entries(templates)) {
                    const meta = metadata[key] || { title: key, desc: "אין תיאור זמין", placeholders: "לא ידוע", risk: "אין מידע" };
                    const div = document.createElement('div');
                    div.className = 'template-group';
                    div.id = `group-${key}`;
                    div.innerHTML = `
                        <label for="${key}">${meta.title} (${key})</label>
                        <div class="explanation">
                            <strong>תיאור:</strong> ${meta.desc}<br>
                            <strong>תגיות להחלפה (Placeholders):</strong> <span class="placeholder-list">${meta.placeholders}</span>
                        </div>
                        <textarea class="form-control" id="${key}" name="${key}">${value}</textarea>
                        <div class="warning">⚠️ אזהרה: ${meta.risk}</div>
                    `;
                    container.appendChild(div);
                }
                checkDiff();
            });
    }

    const noSyncAlerts = document.getElementById('no-sync-alerts');
    const btnCheckSync = document.getElementById('btn-check-sync');

    btnCheckSync.addEventListener('click', () => {
        btnCheckSync.innerHTML = '⏳ בודק...';
        checkDiff(true);
    });

    function checkDiff(manualCheck = false) {
        
        console.log('--- Starting checkDiff ---');
        console.log('Manual check triggered:', manualCheck);
        
        syncAlerts.style.display = 'none';
        noSyncAlerts.style.display = 'none';
        syncDetails.innerHTML = ''; // Clear previous
        
        fetch('/api/templates/diff')
            .then(res => {
                console.log('Received response from /api/templates/diff, status:', res.status);
                return res.json();
            })
            .then(diff => {
                console.log('Parsed diff data:', diff);
                btnCheckSync.innerHTML = '🔄 בדוק פערים מול הקוד';
                
                let html = '';
                const keysToSync = [];

                if (diff.new_in_json && diff.new_in_json.length > 0) {
                    console.log(`Found ${diff.new_in_json.length} new items in JSON.`);
                    html += `<h6 class="fw-bold">🆕 תבניות חדשות בקוד (JSON):</h6><ul class="mb-3">`;
                    diff.new_in_json.forEach(item => {
                        console.log('- New item key:', item.key);
                        html += `<li><strong>${item.key}</strong></li>`;
                        keysToSync.push(item.key);
                    });
                    html += `</ul>`;
                }

                if (diff.different && diff.different.length > 0) {
                    console.log(`Found ${diff.different.length} modified items.`);
                    html += `<h6 class="fw-bold">🔄 שינויי תוכן (הקוד שונה מה-DB):</h6><ul class="mb-3" style="list-style-type: none; padding-right: 0;">`;
                    diff.different.forEach(item => {
                        console.log(`- Modified item: ${item.key}`);
                        console.log(`  DB Content:   ${item.db_content}`);
                        console.log(`  JSON Content: ${item.json_content}`);
                        
                        const dbContent = item.db_content || "";
                        const jsonContent = item.json_content || "";
                        
                        html += `<li class="mb-3">
                            <span class="badge bg-warning text-dark fs-6 mb-2">${item.key}</span>
                            <div class="card shadow-sm border-warning">
                                <div class="card-body p-2" style="font-size: 0.95rem; white-space: pre-wrap; font-family: monospace; text-align: right;" dir="rtl">
                                    <div class="text-danger mb-2 border-bottom pb-2">
                                        <div class="fw-bold mb-1">❌ בבסיס הנתונים (מוצג כרגע):</div>
                                        <div style="background-color: #ffebee; padding: 5px; border-radius: 4px;">${dbContent}</div>
                                    </div>
                                    <div class="text-success mt-2">
                                        <div class="fw-bold mb-1">✅ בקובץ הקוד (JSON החדש):</div>
                                        <div style="background-color: #e8f5e9; padding: 5px; border-radius: 4px;">${jsonContent}</div>
                                    </div>
                                </div>
                            </div>
                        </li>`;
                        keysToSync.push(item.key);
                        
                        const group = document.getElementById(`group-${item.key}`);
                        if (group) {
                            group.style.border = '2px solid #ffc107';
                            group.style.backgroundColor = '#fffef0';
                            console.log(`Highlighted form group for ${item.key}`);
                        } else {
                            console.warn(`Could not find form group for ${item.key}`);
                        }
                    });
                    html += `</ul>`;
                }

                console.log(`Total keys to sync: ${keysToSync.length}`);
                
                if (keysToSync.length > 0) {
                    console.log('Updating HTML and showing sync alert box.');
                    syncDetails.innerHTML = html;
                    syncAlerts.style.display = 'block';
                    
                    try {
                        syncAlerts.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    } catch (e) {
                        console.log('ScrollIntoView failed (normal in some old browsers)', e);
                    }
                    
                    btnSyncAll.onclick = (e) => {
                        e.preventDefault();
                        console.log('Sync All button clicked. Syncing keys:', keysToSync);
                        sync(keysToSync);
                    };
                } else {
                    console.log('No keys to sync. Hiding sync alert box.');
                    syncAlerts.style.display = 'none';
                    if (manualCheck) {
                        noSyncAlerts.style.display = 'block';
                        setTimeout(() => noSyncAlerts.style.display = 'none', 4000);
                    }
                }
            })
            .catch(err => {
                console.error('--- ERROR IN checkDiff ---', err);
                btnCheckSync.innerHTML = '🔄 שגיאה בבדיקה';
                setTimeout(() => btnCheckSync.innerHTML = '🔄 בדוק פערים מול הקוד', 3000);
            });
    }

    function sync(keys) {
        if (!confirm('האם אתה בטוח שברצונך לעדכן את בסיס הנתונים לפי קובץ ה-JSON? פעולה זו תדרוס שינויים ידניים שביצעת בתבניות אלו.')) return;
        
        fetch('/api/templates/sync', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ keys })
        })
        .then(res => {
            if (res.ok) {
                location.reload();
            } else {
                alert('שגיאה בסנכרון');
            }
        });
    }

    loadTemplates();

    // Save templates
    form.onsubmit = (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        const data = {};
        formData.forEach((value, key) => data[key] = value);

        fetch('/api/templates', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => {
            if (res.ok) {
                successAlert.style.display = 'block';
                setTimeout(() => successAlert.style.display = 'none', 3000);
            } else {
                errorAlert.style.display = 'block';
                setTimeout(() => errorAlert.style.display = 'none', 3000);
            }
        });
    };
</script>

</body>
</html>
