<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemara SMS Simulation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #075e54;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        #setup {
            padding: 10px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .mode-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-right: auto;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        /* Switch styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #075e54;
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 10px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }
        .message.in {
            align-self: flex-start;
            background-color: #fff;
            border: 1px solid #ddd;
        }
        .message.out {
            align-self: flex-end;
            background-color: #dcf8c6;
            border: 1px solid #c5e1a5;
        }
        .message .time {
            font-size: 0.7rem;
            color: #888;
            margin-top: 5px;
            display: block;
            text-align: left;
        }
        #input-area {
            padding: 15px;
            background: #eee;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }
        button {
            padding: 10px 20px;
            background-color: #075e54;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #128c7e;
        }
    </style>
</head>
<body>
    <nav style="background-color: #075e54; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;">
        <div style="font-weight: bold; font-size: 1.2rem;">סימולטור גמרא SMS</div>
        <div style="display: flex; gap: 20px;">
            <a href="/" style="color: white; text-decoration: none;">לוח בקרה</a>
            <a href="/edit-templates" style="color: white; text-decoration: none;">עריכת תבניות</a>
        </div>
    </nav>

    <div id="setup">
        <div style="display: flex; gap: 10px; align-items: center;">
            <label for="phone">מספר טלפון:</label>
            <input type="text" id="phone" placeholder="למשל 0501234567" value="0501234567">
            <button onclick="loadHistory()">התחבר</button>
        </div>
        
        <div class="mode-toggle">
            <span>מצב חי (SMS אמיתי):</span>
            <label class="switch">
                <input type="checkbox" id="live-mode-checkbox" onchange="toggleLiveMode()">
                <span class="slider"></span>
            </label>
            <span id="mode-status" style="font-weight: bold; color: #888;">כבוי</span>
        </div>
    </div>

    <div id="chat-container">
        <!-- Messages will appear here -->
    </div>

    <div id="input-area">
        <input type="text" id="msg-input" placeholder="הקלד הודעה..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">שלח</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const phoneInput = document.getElementById('phone');
        const msgInput = document.getElementById('msg-input');
        const liveModeCheckbox = document.getElementById('live-mode-checkbox');
        const modeStatus = document.getElementById('mode-status');

        async function updateModeUI() {
            try {
                const response = await fetch('/toggle_mode');
                const data = await response.json();
                liveModeCheckbox.checked = data.live_mode;
                modeStatus.innerText = data.live_mode ? 'פעיל' : 'כבוי';
                modeStatus.style.color = data.live_mode ? '#075e54' : '#888';
            } catch (err) {
                console.error('Error fetching mode:', err);
            }
        }

        async function toggleLiveMode() {
            const enabled = liveModeCheckbox.checked;
            try {
                const response = await fetch('/toggle_mode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled })
                });
                const data = await response.json();
                modeStatus.innerText = enabled ? 'פעיל' : 'כבוי';
                modeStatus.style.color = enabled ? '#075e54' : '#888';
                alert(enabled ? 'מצב SMS חי הופעל! הודעות יישלחו כעת למכשירים אמיתיים.' : 'מצב סימולציה הופעל. הודעות לא יישלחו באמת.');
            } catch (err) {
                console.error('Error toggling mode:', err);
                liveModeCheckbox.checked = !enabled; // revert
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        async function loadHistory() {
            const phone = phoneInput.value.trim();
            if (!phone) return;
            
            chatContainer.innerHTML = 'טוען היסטוריה...';
            
            try {
                const response = await fetch(`/history?phone=${phone}`);
                const history = await response.json();
                
                chatContainer.innerHTML = '';
                history.reverse().forEach(msg => {
                    addMessageToUI(msg.message, msg.direction, msg.sent_at);
                });
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } catch (err) {
                console.error(err);
                chatContainer.innerHTML = 'שגיאה בטעינת היסטוריה';
            }
        }

        async function sendMessage() {
            const phone = phoneInput.value.trim();
            const message = msgInput.value.trim();
            
            if (!phone || !message) return;
            
            msgInput.value = '';
            // Add outgoing message immediately to UI
            addMessageToUI(message, 'in', new Date().toLocaleTimeString());

            try {
                const response = await fetch('/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, message })
                });
                
                // Reload history to see system replies
                setTimeout(loadHistory, 500); 
            } catch (err) {
                console.error(err);
            }
        }

        function addMessageToUI(text, direction, time) {
            const div = document.createElement('div');
            div.className = `message ${direction}`;
            
            const content = document.createElement('div');
            content.innerText = text;
            div.appendChild(content);
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            timeSpan.innerText = time;
            div.appendChild(timeSpan);
            
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Initial load
        window.onload = () => {
            loadHistory();
            updateModeUI();
        };
    </script>
</body>
</html>
