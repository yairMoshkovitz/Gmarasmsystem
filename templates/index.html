<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemara SMS Simulation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #075e54;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        #setup {
            padding: 10px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 10px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }
        .message.in {
            align-self: flex-start;
            background-color: #fff;
            border: 1px solid #ddd;
        }
        .message.out {
            align-self: flex-end;
            background-color: #dcf8c6;
            border: 1px solid #c5e1a5;
        }
        .message .time {
            font-size: 0.7rem;
            color: #888;
            margin-top: 5px;
            display: block;
            text-align: left;
        }
        #input-area {
            padding: 15px;
            background: #eee;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }
        button {
            padding: 10px 20px;
            background-color: #075e54;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #128c7e;
        }
    </style>
</head>
<body>
    <header>סימולטור Gemara SMS</header>
    
    <div id="setup">
        <label for="phone">מספר טלפון:</label>
        <input type="text" id="phone" placeholder="למשל 0501234567" value="0501234567">
        <button onclick="loadHistory()">התחבר</button>
    </div>

    <div id="chat-container">
        <!-- Messages will appear here -->
    </div>

    <div id="input-area">
        <input type="text" id="msg-input" placeholder="הקלד הודעה..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">שלח</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const phoneInput = document.getElementById('phone');
        const msgInput = document.getElementById('msg-input');

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        async function loadHistory() {
            const phone = phoneInput.value.trim();
            if (!phone) return;
            
            chatContainer.innerHTML = 'טוען היסטוריה...';
            
            try {
                const response = await fetch(`/history?phone=${phone}`);
                const history = await response.json();
                
                chatContainer.innerHTML = '';
                history.reverse().forEach(msg => {
                    addMessageToUI(msg.message, msg.direction, msg.sent_at);
                });
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } catch (err) {
                console.error(err);
                chatContainer.innerHTML = 'שגיאה בטעינת היסטוריה';
            }
        }

        async function sendMessage() {
            const phone = phoneInput.value.trim();
            const message = msgInput.value.trim();
            
            if (!phone || !message) return;
            
            msgInput.value = '';
            // Add outgoing message immediately to UI
            addMessageToUI(message, 'in', new Date().toLocaleTimeString());

            try {
                const response = await fetch('/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, message })
                });
                
                // Reload history to see system replies
                setTimeout(loadHistory, 500); 
            } catch (err) {
                console.error(err);
            }
        }

        function addMessageToUI(text, direction, time) {
            const div = document.createElement('div');
            div.className = `message ${direction}`;
            
            const content = document.createElement('div');
            content.innerText = text;
            div.appendChild(content);
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            timeSpan.innerText = time;
            div.appendChild(timeSpan);
            
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Initial load
        window.onload = loadHistory;
    </script>
</body>
</html>
